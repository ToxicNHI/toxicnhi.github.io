  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080810;
      --bg2:         #0a0810;
      --bg3:         #0d0810;
      --bg4:         #100c18;
      --border:      #1e1208;
      --border2:     #2a1a08;
      --border3:     #3a2010;
      --gold:        #c8973a;
      --gold2:       #e8a830;
      --gold3:       #7a4a10;
      --gold4:       #d4943a;
      --text:        #c8b89a;
      --text2:       #b0a080;
      --text3:       #d0b890;
      --text4:       #f0d090;
      --muted:       #6a5535;
      --muted2:      #5a4028;
      --muted3:      #4a3820;
      --muted4:      #3a2c1a;
      --muted5:      #3a2810;
      --muted6:      #2a1e10;
      --font-d:      'Cinzel', serif;
      --font-b:      'Rajdhani', sans-serif;
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      font-size: clamp(14px, 2vw, 15px);
      line-height: 1.5;
      min-height: 100vh;
      background-image:
        repeating-linear-gradient(0deg,   transparent, transparent 40px, rgba(200,140,40,.016) 40px, rgba(200,140,40,.016) 41px),
        repeating-linear-gradient(90deg,  transparent, transparent 40px, rgba(200,140,40,.016) 40px, rgba(200,140,40,.016) 41px);
    }

    /* ── Accessibility ────────────────────────────────── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    :focus-visible { outline: 2px solid var(--gold3); outline-offset: 2px; }

    /* ── App Wrapper ──────────────────────────────────── */
    .app-wrap {
      max-width: 1400px;
      margin: 0 auto;
      border-left: 1px solid var(--border2);
      border-right: 1px solid var(--border2);
      border-bottom: 1px solid var(--border2);
      border-top: 2px solid var(--gold3);
      background: var(--bg2);
      min-height: 100vh;
    }

    /* ── Controls Bar ─────────────────────────────────── */
    .controls {
      padding: clamp(10px, 2vw, 14px) clamp(12px, 3vw, 20px);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }

    .search-wrap {
      flex: 1 1 180px;
      min-width: 0;
      position: relative;
      align-self: flex-start;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
      line-height: 1;
    }

    .search-wrap input {
      width: 100%;
      background: var(--bg4);
      border: 1px solid var(--border2);
      color: var(--text3);
      padding: 8px 12px 8px 34px;
      font-family: var(--font-b);
      font-size: 14px;
      line-height: 1;
      outline: none;
      transition: border-color .2s;
      clip-path: polygon(8px 0%, 100% 0%, 100% 100%, 0% 100%, 0% 8px);
      display: block;
      box-sizing: border-box;
    }
    .search-wrap input:focus { border-color: var(--gold3); color: var(--text4); }
    .search-wrap input::placeholder { color: var(--muted3); }

    /* ── Filter Tabs ──────────────────────────────────── */
    .filter-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1 1 100%;
    }

    .tab {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: clamp(5px, 1vw, 7px) clamp(9px, 1.5vw, 13px);
      cursor: pointer;
      font-family: var(--font-b);
      font-size: clamp(11px, 1.5vw, 12px);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all .18s;
      white-space: nowrap;
      clip-path: polygon(6px 0%, 100% 0%, 100% 100%, 0% 100%, 0% 6px);
      border: none;
      border: 1px solid var(--border2);
    }
    .tab.active  { color: var(--gold2); border-color: var(--gold3); background: #1a0e04; }
    .tab:hover:not(.active) { border-color: var(--muted5); color: #a07840; }

    /* ── Results Count ────────────────────────────────── */
    .results-count {
      padding: 8px clamp(12px, 3vw, 20px) 4px;
      font-size: 11px;
      color: var(--muted3);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: var(--font-d);
    }

    /* ── Content Area ─────────────────────────────────── */
    .content {
      padding: clamp(12px, 2.5vw, 16px) clamp(12px, 3vw, 20px) clamp(20px, 4vw, 28px);
    }

    /* ── Section Label ────────────────────────────────── */
    .section-label {
      font-family: var(--font-d);
      font-size: clamp(9px, 1.4vw, 10px);
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border2), transparent);
    }

    /* ── Prism Grid ───────────────────────────────────── */
    .prism-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
      gap: clamp(10px, 2vw, 13px);
    }

    /* ── Prism Card ───────────────────────────────────── */
    .prism-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-top: 1px solid var(--border2);
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
      display: flex;
      flex-direction: column;
    }
    .prism-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--prism-color, var(--gold3)), transparent);
    }
    .prism-card:hover { border-color: var(--border3); }

    /* ── Prism Header ─────────────────────────────────── */
    .prism-header {
      padding: clamp(10px, 2vw, 13px) clamp(12px, 2.5vw, 15px);
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.5vw, 12px);
      border-bottom: 1px solid var(--border);
      background: #0a0808;
      flex-shrink: 0;
    }

    .prism-gem {
      width: clamp(30px, 5vw, 36px);
      height: clamp(30px, 5vw, 36px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--prism-color, var(--gold3));
      background: rgba(0,0,0,.5);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .prism-gem svg {
      width: clamp(14px, 2.5vw, 18px);
      height: clamp(14px, 2.5vw, 18px);
    }

    .prism-meta { flex: 1; min-width: 0; }

    .prism-name {
      font-family: var(--font-d);
      font-size: clamp(10px, 1.8vw, 12px);
      font-weight: 600;
      color: var(--prism-color, var(--gold));
      letter-spacing: .5px;
      line-height: 1.3;
    }
    .prism-cat {
      font-size: clamp(10px, 1.6vw, 11px);
      color: var(--muted2);
      margin-top: 2px;
      letter-spacing: .3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .prism-rarity {
      font-size: clamp(9px, 1.4vw, 10px);
      padding: 3px 8px;
      font-weight: 600;
      letter-spacing: 1px;
      flex-shrink: 0;
      align-self: flex-start;
      font-family: var(--font-d);
      clip-path: polygon(6px 0%, 100% 0%, 100% 100%, 0% 100%, 0% 6px);
      white-space: nowrap;
    }
    .rarity-magic   { background: #0d1828; color: #5a8ac8; border: 1px solid #1a3050; }
    .rarity-rare    { background: #1a1408; color: #c8a830; border: 1px solid #3a2808; }
    .rarity-special { background: #180d1a; color: #9060b0; border: 1px solid #3a1848; }

    /* ── Prism Body ───────────────────────────────────── */
    .prism-body {
      padding: clamp(10px, 2vw, 13px) clamp(12px, 2.5vw, 15px);
      flex: 1;
    }

    .affix-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .affix-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: clamp(3px, .8vw, 4px) 6px;
      font-size: clamp(12px, 1.8vw, 13px);
      color: var(--text2);
      line-height: 1.3;
      border-left: 2px solid transparent;
      transition: background .15s, border-color .15s, color .15s;
    }
    .affix-item:hover {
      background: rgba(200,151,58,.04);
      border-left-color: var(--prism-color, var(--gold3));
      color: var(--text3);
    }
    .affix-item.highlighted {
      background: rgba(200,151,58,.1);
      border-left-color: var(--prism-color, var(--gold));
      color: var(--text4);
    }
    .affix-item.dim { opacity: .4; }

    .affix-bullet {
      width: 4px;
      height: 4px;
      border: 1px solid var(--prism-color, var(--gold3));
      flex-shrink: 0;
      transform: rotate(45deg);
    }

    /* ── Notes ────────────────────────────────────────── */
    .note-box {
      border: 1px solid #4a1010;
      background: #100808;
      padding: 8px 10px;
      margin-top: 10px;
      font-size: clamp(11px, 1.6vw, 12px);
      color: #c06060;
      line-height: 1.55;
    }
    .note-box::before { content: '⚠ '; color: #e05050; }

    .tip-box {
      border: 1px solid #1a3050;
      background: #080d18;
      padding: 8px 10px;
      margin-top: 8px;
      font-size: clamp(11px, 1.6vw, 12px);
      color: #6090c0;
      line-height: 1.55;
    }
    .tip-box::before { content: '◆ '; color: #4070a0; }

    /* ── Special Body ─────────────────────────────────── */
    .special-body {
      padding: clamp(10px, 2vw, 13px) clamp(12px, 2.5vw, 15px);
      font-size: clamp(12px, 1.8vw, 13px);
      line-height: 1.7;
      color: #a09070;
    }
    .special-body p { margin-bottom: 8px; }
    .special-body p:last-child { margin-bottom: 0; }
    .special-body strong { color: #d4b070; }

    /* ── Empty State ──────────────────────────────────── */
    .empty {
      text-align: center;
      padding: clamp(32px, 6vw, 52px) 20px;
      color: var(--muted4);
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; display: block; opacity: .5; }

    /* ── Search Highlight ─────────────────────────────── */
    mark {
      background: rgba(200,151,40,.25);
      color: #f0c850;
      border-radius: 2px;
      padding: 0 2px;
    }

    /* ── Spacer between sections ──────────────────────── */
    .section-spacer { margin-top: clamp(16px, 3vw, 22px); }

    /* ── Responsive Breakpoints ───────────────────────── */

    /* Large tablets / small desktops: shrink grid min */
    @media (max-width: 900px) {
      .prism-grid {
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
      }
    }

    /* Tablets: stack search above tabs, single-column grid */
    @media (max-width: 700px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
      .search-wrap {
        flex: none;
        width: 100%;
        align-self: auto;
      }
      .filter-tabs {
        flex: none;
        width: 100%;
        justify-content: flex-start;
      }
      .prism-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Phones: tighten padding further */
    @media (max-width: 480px) {
      .prism-header {
        gap: 8px;
      }
      .prism-rarity {
        display: none;
      }
      .prism-cat {
        font-size: 10px;
      }
      .affix-item {
        font-size: 13px;
      }
    }

    /* Very small phones */
    @media (max-width: 360px) {
      .tab {
        padding: 5px 8px;
        font-size: 10px;
        letter-spacing: .5px;
      }
    }
  </style>
</head>
<body>

<h1 class="sr-only">Diablo 4 Tuning Prism Affix Reference — Season 13 Horadric Cube Guide</h1>

<div class="app-wrap" role="main">

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">&#9906;</span>
      <input
        type="search"
        id="search"
        placeholder="Search affixes or prism names..."
        aria-label="Search affixes or prism names"
        autocomplete="off"
        spellcheck="false"
      >
    </div>
    <nav class="filter-tabs" id="tabs" role="tablist" aria-label="Filter prisms by category">
      <button class="tab active" data-filter="all"        role="tab" aria-selected="true">All</button>
      <button class="tab"        data-filter="offensive"  role="tab" aria-selected="false">Offensive</button>
      <button class="tab"        data-filter="defensive"  role="tab" aria-selected="false">Defensive</button>
      <button class="tab"        data-filter="resistance" role="tab" aria-selected="false">Resistance</button>
      <button class="tab"        data-filter="resource"   role="tab" aria-selected="false">Resource</button>
      <button class="tab"        data-filter="utility"    role="tab" aria-selected="false">Utility</button>
      <button class="tab"        data-filter="skills"     role="tab" aria-selected="false">Skills</button>
      <button class="tab"        data-filter="special"    role="tab" aria-selected="false">Special</button>
    </nav>
  </div>

  <p class="results-count" id="resultsCount" aria-live="polite" aria-atomic="true"></p>

  <div class="content" id="content"></div>
</div>

<script>
const PRISMS = [
  {
    id: 'aggressive',
    name: "Aggressive Tuning Prism",
    category: "Offensive Affixes",
    rarity: "magic", rarityLabel: "Magic",
    color: "#c84030",
    tags: ["offensive"],
    affixes: [
      "Weapon Damage","All Damage Multiplier","Attack Speed",
      "Critical Strike Chance","Critical Strike Damage Multiplier",
      "Vulnerable Damage Multiplier","Damage Over Time Multiplier",
      "Fire Damage Multiplier","Cold Damage Multiplier",
      "Lightning Damage Multiplier","Poison Damage Multiplier",
      "Shadow Damage Multiplier","Physical Damage Multiplier","Thorns"
    ],
    notes: [
      { type: "warn", text: "Does NOT cover Core Stats or Skill affixes — use Adept's Prism for those." },
      { type: "tip",  text: "Use with Focused Reroll to convert one offensive stat into another without touching other categories." }
    ]
  },
  {
    id: 'protector',
    name: "Protector's Tuning Prism",
    category: "Defensive Affixes",
    rarity: "magic", rarityLabel: "Magic",
    color: "#3a70c8",
    tags: ["defensive"],
    affixes: [
      "Maximum Life","Life Regeneration","Life on Hit","Life on Kill",
      "Armor","Resistance to All Elements","Fire Resistance","Cold Resistance",
      "Lightning Resistance","Poison Resistance","Shadow Resistance",
      "Physical Resistance","Damage Reduction","Damage Reduction from Enemies",
      "Dodge Chance","Barrier Generation"
    ],
    notes: [
      { type: "warn", text: "'Resistance to All Elements' is ONLY targetable here — NOT via Chromatic Prism. Many players waste Chromatic prisms trying for All Res." },
      { type: "warn", text: "Fortify Generation appears defensive but is reportedly untargetable by any prism — a known Season 13 bug." }
    ]
  },
  {
    id: 'chromatic',
    name: "Chromatic Tuning Prism",
    category: "Resistance Affixes",
    rarity: "rare", rarityLabel: "Rare",
    color: "#8050c8",
    tags: ["resistance", "defensive"],
    affixes: [
      "Fire Resistance","Cold Resistance","Lightning Resistance",
      "Poison Resistance","Shadow Resistance","Physical Resistance"
    ],
    notes: [
      { type: "warn", text: "Does NOT cover 'Resistance to All Elements' — that is a Defensive affix, targetable only via Protector's Prism." },
      { type: "tip",  text: "Individual resistances overlap with the Defensive pool, so Protector's Prism can also target them." }
    ]
  },
  {
    id: 'resourceful',
    name: "Resourceful Tuning Prism",
    category: "Resource Affixes",
    rarity: "magic", rarityLabel: "Magic",
    color: "#308050",
    tags: ["resource"],
    affixes: [
      "Maximum Resource","Resource Generation","Resource Cost Reduction",
      "Resource per Kill","Resource on Kill","Lucky Hit: Restore Primary Resource"
    ],
    notes: [
      { type: "tip", text: "Key for resource-stacking builds (e.g. Melted Heart of Selig). Use with Focused Reroll to convert resource-adjacent stats." }
    ]
  },
  {
    id: 'pragmatic',
    name: "Pragmatic Tuning Prism",
    category: "Mobility & Utility Affixes",
    rarity: "magic", rarityLabel: "Magic",
    color: "#b08020",
    tags: ["utility", "defensive"],
    affixes: [
      "Movement Speed","Lucky Hit Chance","Cooldown Reduction",
      "Healing Received","Potion Capacity","Max Evade Charges",
      "Attacks Reduce Evade Cooldown","Evade Grants Movement Speed",
      "Barrier Generation","Fortify Generation",
      "Impairment Reduction (⚠ possibly bugged)"
    ],
    notes: [
      { type: "warn", text: "Impairment Reduction appears bugged in Season 13 — may not be targetable by any prism." },
      { type: "tip",  text: "Cooldown Reduction is confirmed in this pool, classified under the Mobility sub-category." }
    ]
  },
  {
    id: 'adept',
    name: "Adept's Tuning Prism",
    category: "Skills & Core Stat Affixes",
    rarity: "magic", rarityLabel: "Magic",
    color: "#c86020",
    tags: ["skills", "offensive"],
    affixes: [
      "Strength","Dexterity","Intelligence","Willpower","All Stats",
      "+[X] to a Specific Skill","+[X] to a Skill Category",
      "+[X] to All Class Skills","Lucky Hit: Chance to [Skill Effect]"
    ],
    notes: [
      { type: "warn", text: "Core stats are NOT in the Aggressive pool — only Adept's reaches Strength, Willpower, etc." },
      { type: "tip",  text: "The only prism that can target skill-level affixes like '+X to Fireball' or '+X to Core Skills'." }
    ]
  },
  {
    id: 'kullean',
    name: "Kullean Tuning Prism",
    category: "Transfiguration — Amulet Special",
    rarity: "special", rarityLabel: "Special",
    color: "#9050b8",
    tags: ["special"],
    isSpecial: true,
    specialDesc: `<p>Used exclusively during <strong>Transfiguration on Amulets</strong>. Adds a bonus <strong>Legendary Aspect</strong> from the utility pool rather than narrowing affix categories.</p><p><strong>Unique behaviour:</strong> Amulets transfigured with this prism are <strong>guaranteed to remain modifiable</strong>, allowing you to reroll the added aspect as many times as you need — making amulets the safest and most repeatable Transfiguration slot.</p><p>Cannot be used for Chaotic/Focused Rerolls or Add Affix recipes. Amulets only.</p>`
  },
  {
    id: 'entropic',
    name: "Entropic Tuning Prism",
    category: "Transfiguration — Outcome Limiter",
    rarity: "special", rarityLabel: "Special",
    color: "#606878",
    tags: ["special"],
    isSpecial: true,
    specialDesc: `<p>Modifies Transfiguration by <strong>removing the absolute worst and best possible outcomes</strong>, pushing results toward the middle range — reducing catastrophic rolls at the cost of capping your ceiling.</p><p><strong>Critical warning:</strong> This prism still carries a <strong>100% chance</strong> of making the item <strong>permanently Unmodifiable</strong>. Reserve for your irreplaceable pieces (Mythics, perfect GA combinations) as an absolute final step.</p>`
  }
];

let activeFilter = 'all';
let searchQuery  = '';

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function hi(t) {
  if (!searchQuery) return esc(t);
  const re = new RegExp(
    '(' + searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')',
    'gi'
  );
  return esc(t).replace(re, '<mark>$1</mark>');
}

function gemSvg(color) {
  return `<svg viewBox="0 0 24 24" aria-hidden="true">
    <polygon points="12,2 20,7 20,17 12,22 4,17 4,7" fill="${color}22" stroke="${color}" stroke-width="1.2"/>
    <polygon points="12,6 17,9 17,15 12,18 7,15 7,9" fill="${color}15"/>
    <circle cx="12" cy="12" r="2.5" fill="${color}" opacity=".8"/>
  </svg>`;
}

function matchesPrism(p) {
  if (activeFilter !== 'all' && !p.tags.includes(activeFilter)) return false;
  if (!searchQuery) return true;
  if (p.name.toLowerCase().includes(searchQuery)) return true;
  if (p.category.toLowerCase().includes(searchQuery)) return true;
  if (!p.isSpecial && p.affixes && p.affixes.some(a => a.toLowerCase().includes(searchQuery))) return true;
  if (p.isSpecial && p.specialDesc && p.specialDesc.toLowerCase().includes(searchQuery)) return true;
  return false;
}

function renderCard(p) {
  const style = `style="--prism-color:${p.color}"`;

  if (p.isSpecial) {
    return `<article class="prism-card" ${style} aria-label="${esc(p.name)}">
      <div class="prism-header">
        <div class="prism-gem" aria-hidden="true">${gemSvg(p.color)}</div>
        <div class="prism-meta">
          <div class="prism-name">${hi(p.name)}</div>
          <div class="prism-cat">${esc(p.category)}</div>
        </div>
        <span class="prism-rarity rarity-${p.rarity}">${esc(p.rarityLabel)}</span>
      </div>
      <div class="special-body">${p.specialDesc}</div>
    </article>`;
  }

  const affixItems = (p.affixes || []).map(a => {
    const isMatch = searchQuery && a.toLowerCase().includes(searchQuery);
    const isBug   = a.includes('⚠');
    return `<li class="affix-item${isMatch ? ' highlighted' : ''}${isBug ? ' dim' : ''}">
      <span class="affix-bullet" aria-hidden="true"></span>
      <span>${hi(a)}</span>
    </li>`;
  }).join('');

  const notes = (p.notes || []).map(n =>
    `<div class="${n.type === 'warn' ? 'note-box' : 'tip-box'}" role="note">${esc(n.text)}</div>`
  ).join('');

  return `<article class="prism-card" ${style} aria-label="${esc(p.name)}">
    <div class="prism-header">
      <div class="prism-gem" aria-hidden="true">${gemSvg(p.color)}</div>
      <div class="prism-meta">
        <div class="prism-name">${hi(p.name)}</div>
        <div class="prism-cat">${esc(p.category)}</div>
      </div>
      <span class="prism-rarity rarity-${p.rarity}">${esc(p.rarityLabel)}</span>
    </div>
    <div class="prism-body">
      <ul class="affix-list" aria-label="Affixes for ${esc(p.name)}">${affixItems}</ul>
      ${notes}
    </div>
  </article>`;
}

function render() {
  const filtered = PRISMS.filter(matchesPrism);
  const rc       = document.getElementById('resultsCount');

  rc.textContent = filtered.length === PRISMS.length
    ? `All ${PRISMS.length} prisms`
    : `${filtered.length} of ${PRISMS.length} prisms`;

  const content  = document.getElementById('content');

  if (!filtered.length) {
    content.innerHTML = `<div class="empty" role="status">
      <span class="empty-icon" aria-hidden="true">◇</span>
      <div style="font-family:'Cinzel',serif;font-size:13px;color:#3a2c1a">No prisms found</div>
      <div style="font-size:12px;margin-top:6px;color:#2a1e10">Try a different search or filter</div>
    </div>`;
    return;
  }

  const standard = filtered.filter(p => !p.isSpecial);
  const special  = filtered.filter(p =>  p.isSpecial);
  let html = '';

  if (standard.length) {
    html += `<div class="section-label">Affix category prisms</div>
             <div class="prism-grid">`;
    standard.forEach(p => { html += renderCard(p); });
    html += `</div>`;
  }

  if (special.length) {
    if (standard.length) html += `<div class="section-spacer"></div>`;
    html += `<div class="section-label">Special &amp; transfiguration prisms</div>
             <div class="prism-grid">`;
    special.forEach(p => { html += renderCard(p); });
    html += `</div>`;
  }

  content.innerHTML = html;
}

/* Events */
document.getElementById('search').addEventListener('input', function () {
  searchQuery = this.value.toLowerCase().trim();
  render();
});

document.getElementById('tabs').addEventListener('click', function (e) {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active');
    t.setAttribute('aria-selected', 'false');
  });
  tab.classList.add('active');
  tab.setAttribute('aria-selected', 'true');
  activeFilter = tab.dataset.filter;
  render();
});

render();
</script>

</body>
</html>
