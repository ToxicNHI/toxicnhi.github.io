<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Metamorphous&family=Rajdhani:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080810;
  color:#c8b89a;
  font-family:'Rajdhani',sans-serif;
  font-size:15px;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(200,140,40,.018) 40px,rgba(200,140,40,.018) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(200,140,40,.018) 40px,rgba(200,140,40,.018) 41px);
}
.app-wrap{border:1px solid #2a1a08;border-top:2px solid #7a4a10;background:#0a0810}

.app-header{
  background:#0d0808;
  border-bottom:1px solid #2a1a08;
  padding:0 20px;
  display:flex;align-items:center;gap:16px;
  min-height:62px;
  position:relative;
}
.app-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,#b87820,#e8a830,#b87820,transparent);
}
.logo-wrap{position:relative;width:40px;height:40px;flex-shrink:0}
.header-titles{flex:1}
.header-titles h1{
  font-family:'Cinzel',serif;font-size:16px;font-weight:700;
  color:#d4943a;letter-spacing:3px;
}
.header-titles p{font-size:10px;color:#6a5535;letter-spacing:3px;text-transform:uppercase;margin-top:3px}

.divider-rune{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px 6px;
  color:#3a2810;font-size:18px;
}
.divider-rune::before,.divider-rune::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,#3a2810);
}
.divider-rune::before{background:linear-gradient(90deg,transparent,#3a2810)}
.divider-rune::after{background:linear-gradient(90deg,#3a2810,transparent)}

.controls{padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid #1a1008}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{
  width:100%;background:#100c18;border:1px solid #2a1a08;
  color:#d4b880;padding:8px 12px 8px 36px;
  font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s;
  clip-path:polygon(8px 0%,100% 0%,100% 100%,0% 100%,0% 8px);
}
.search-wrap input:focus{border-color:#7a4a10;color:#f0d8a0}
.search-wrap input::placeholder{color:#3a2c1a}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#5a3a18;font-size:15px;pointer-events:none}

.filter-tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{
  background:#0d0810;border:1px solid #2a1a08;color:#6a5535;
  padding:6px 12px;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  transition:all .18s;white-space:nowrap;
  clip-path:polygon(6px 0%,100% 0%,100% 100%,0% 100%,0% 6px);
}
.tab.active{color:#e8a830;border-color:#7a4a10;background:#1a0e04}
.tab:hover:not(.active){border-color:#3a2810;color:#a07840}

.results-count{padding:8px 20px 4px;font-size:11px;color:#4a3820;letter-spacing:2px;text-transform:uppercase;font-family:'Cinzel',serif}

.content{padding:14px 20px 20px}
.section-label{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:#5a3a18;
  margin-bottom:12px;text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#2a1808,transparent)}

.prism-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

.prism-card{
  background:#0d0810;
  border:1px solid #1e1208;
  border-top:1px solid #2a1a08;
  position:relative;overflow:hidden;
  transition:border-color .2s;
}
.prism-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--prism-color,#7a4a10),transparent);
}
.prism-card:hover{border-color:#3a2010}

.prism-header{
  padding:12px 14px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid #1a1008;
  background:#0a0808;
}
.prism-gem{
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;
  border:1px solid var(--prism-color,#7a4a10);
  background:rgba(0,0,0,.5);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
}
.prism-gem svg{width:18px;height:18px}
.prism-name{
  font-family:'Cinzel',serif;font-size:12px;font-weight:600;
  color:var(--prism-color,#c8973a);letter-spacing:.5px;line-height:1.3;
}
.prism-cat{font-size:11px;color:#5a4028;margin-top:2px;letter-spacing:.5px}
.prism-rarity{
  font-size:10px;padding:3px 8px;margin-left:auto;font-weight:600;
  letter-spacing:1px;flex-shrink:0;align-self:flex-start;
  font-family:'Cinzel',serif;
  clip-path:polygon(6px 0%,100% 0%,100% 100%,0% 100%,0% 6px);
}
.rarity-magic{background:#0d1828;color:#5a8ac8;border:1px solid #1a3050}
.rarity-rare{background:#1a1408;color:#c8a830;border:1px solid #3a2808}
.rarity-special{background:#180d1a;color:#9060b0;border:1px solid #3a1848}

.prism-body{padding:12px 14px}
.affix-list{list-style:none;display:flex;flex-direction:column;gap:2px}
.affix-item{
  display:flex;align-items:center;gap:8px;
  padding:4px 6px;font-size:13px;color:#b0a080;line-height:1.3;
  border-left:2px solid transparent;
}
.affix-item:hover{background:rgba(200,151,58,.04);border-left-color:var(--prism-color,#7a4a10);color:#d0b890}
.affix-item.highlighted{background:rgba(200,151,58,.1);border-left-color:var(--prism-color,#c8973a);color:#f0d090}
.affix-item.dim{opacity:.4}
.affix-bullet{
  width:4px;height:4px;border:1px solid var(--prism-color,#7a4a10);
  flex-shrink:0;transform:rotate(45deg);
}

.note-box{
  border:1px solid #4a1010;background:#100808;
  padding:8px 10px;margin-top:10px;font-size:12px;color:#c06060;line-height:1.5;
  position:relative;
}
.note-box::before{content:'⚠ ';color:#e05050}
.tip-box{
  border:1px solid #1a3050;background:#080d18;
  padding:8px 10px;margin-top:8px;font-size:12px;color:#6090c0;line-height:1.5;
}
.tip-box::before{content:'◆ ';color:#4070a0}

.special-body{
  padding:12px 14px;font-size:13px;line-height:1.7;color:#a09070;
}
.special-body p{margin-bottom:8px}
.special-body p:last-child{margin-bottom:0}
.special-body strong{color:#d4b070}

.empty{text-align:center;padding:48px 20px;color:#3a2c1a}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.5;display:block}

mark{background:rgba(200,151,40,.25);color:#f0c850;border-radius:2px;padding:0 2px}
</style>
<div class="app-wrap">

<div class="app-header">
  <div class="logo-wrap">
    <svg viewBox="0 0 40 40" width="40" height="40">
      <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="#0d0808" stroke="#7a4a10" stroke-width="1"/>
      <polygon points="20,6 32,13 32,27 20,34 8,27 8,13" fill="none" stroke="#c8973a" stroke-width=".5" opacity=".4"/>
      <polygon points="20,12 27,16 27,24 20,28 13,24 13,16" fill="#1a0c04" stroke="#c8973a" stroke-width=".8"/>
      <circle cx="20" cy="20" r="3.5" fill="#c8973a"/>
      <line x1="20" y1="12" x2="20" y2="16.5" stroke="#c8973a" stroke-width=".7"/>
      <line x1="20" y1="23.5" x2="20" y2="28" stroke="#c8973a" stroke-width=".7"/>
      <line x1="13" y1="20" x2="16.5" y2="20" stroke="#c8973a" stroke-width=".7"/>
      <line x1="23.5" y1="20" x2="27" y2="20" stroke="#c8973a" stroke-width=".7"/>
    </svg>
  </div>
  <div class="header-titles">
    <h1>Tuning Prism Reference</h1>
    <p>Horadric Cube</p>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <i class="ti ti-search search-icon" aria-hidden="true"></i>
    <input type="text" id="search" placeholder="Search affixes, prisms...">
  </div>
  <div class="filter-tabs" id="tabs">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="offensive">Offensive</button>
    <button class="tab" data-filter="defensive">Defensive</button>
    <button class="tab" data-filter="resistance">Resistance</button>
    <button class="tab" data-filter="resource">Resource</button>
    <button class="tab" data-filter="utility">Utility</button>
    <button class="tab" data-filter="skills">Skills</button>
    <button class="tab" data-filter="special">Special</button>
  </div>
</div>

<div class="results-count" id="resultsCount"></div>
<div class="content" id="content"></div>
</div>

<script>
const PRISMS=[
  {id:'aggressive',name:"Aggressive Tuning Prism",category:"Offensive Affixes",rarity:"magic",rarityLabel:"Magic",color:"#c84030",tags:["offensive"],
   affixes:["Weapon Damage","All Damage Multiplier","Attack Speed","Critical Strike Chance","Critical Strike Damage Multiplier","Vulnerable Damage Multiplier","Damage Over Time Multiplier","Fire Damage Multiplier","Cold Damage Multiplier","Lightning Damage Multiplier","Poison Damage Multiplier","Shadow Damage Multiplier","Physical Damage Multiplier","Thorns"],
   notes:[{type:"warn",text:"Does NOT cover Core Stats or Skill affixes — use Adept's Prism for those."},{type:"tip",text:"Use with Focused Reroll to convert one offensive stat into another without touching other categories."}],
   gemPath:"M9,4 L15,4 L18,9 L15,14 L9,14 L6,9 Z"
  },
  {id:"protector",name:"Protector's Tuning Prism",category:"Defensive Affixes",rarity:"magic",rarityLabel:"Magic",color:"#3a70c8",tags:["defensive"],
   affixes:["Maximum Life","Life Regeneration","Life on Hit","Life on Kill","Armor","Resistance to All Elements","Fire Resistance","Cold Resistance","Lightning Resistance","Poison Resistance","Shadow Resistance","Physical Resistance","Damage Reduction","Damage Reduction from Enemies","Dodge Chance","Barrier Generation"],
   notes:[{type:"warn",text:"'Resistance to All Elements' is ONLY targetable here — NOT via Chromatic Prism. Many players waste Chromatic prisms trying for All Res."},{type:"warn",text:"Fortify Generation appears defensive but is reportedly untargetable by any prism — a known Season 13 bug."}],
   gemPath:"M9,3 L15,3 L18,9 L15,15 L9,15 L6,9 Z"
  },
  {id:"chromatic",name:"Chromatic Tuning Prism",category:"Resistance Affixes",rarity:"rare",rarityLabel:"Rare",color:"#8050c8",tags:["resistance","defensive"],
   affixes:["Fire Resistance","Cold Resistance","Lightning Resistance","Poison Resistance","Shadow Resistance","Physical Resistance"],
   notes:[{type:"warn",text:"Does NOT cover 'Resistance to All Elements' — that is a Defensive affix, not a Resistance affix."},{type:"tip",text:"Individual resistances overlap with the Defensive pool, so Protector's Prism can also target them."}],
   gemPath:"M9,4 L15,4 L18,9 L15,14 L9,14 L6,9 Z"
  },
  {id:"resourceful",name:"Resourceful Tuning Prism",category:"Resource Affixes",rarity:"magic",rarityLabel:"Magic",color:"#308050",tags:["resource"],
   affixes:["Maximum Resource","Resource Generation","Resource Cost Reduction","Resource per Kill","Resource on Kill","Lucky Hit: Restore Primary Resource"],
   notes:[{type:"tip",text:"Key for resource-stacking builds (e.g. Melted Heart of Selig). Use with Focused Reroll to convert resource-adjacent stats."}],
   gemPath:"M9,4 L15,4 L18,9 L15,14 L9,14 L6,9 Z"
  },
  {id:"pragmatic",name:"Pragmatic Tuning Prism",category:"Mobility & Utility Affixes",rarity:"magic",rarityLabel:"Magic",color:"#b08020",tags:["utility","defensive"],
   affixes:["Movement Speed","Lucky Hit Chance","Cooldown Reduction","Healing Received","Potion Capacity","Max Evade Charges","Attacks Reduce Evade Cooldown","Evade Grants Movement Speed","Barrier Generation","Fortify Generation","Impairment Reduction (⚠ possibly bugged)"],
   notes:[{type:"warn",text:"Impairment Reduction appears bugged in Season 13 — may not be targetable by any prism."},{type:"tip",text:"Cooldown Reduction is confirmed in this pool, classified under the Mobility sub-category."}],
   gemPath:"M9,4 L15,4 L18,9 L15,14 L9,14 L6,9 Z"
  },
  {id:"adept",name:"Adept's Tuning Prism",category:"Skills & Core Stat Affixes",rarity:"magic",rarityLabel:"Magic",color:"#c86020",tags:["skills","offensive"],
   affixes:["Strength","Dexterity","Intelligence","Willpower","All Stats","+[X] to a Specific Skill","+[X] to a Skill Category","+[X] to All Class Skills","Lucky Hit: Chance to [Skill Effect]"],
   notes:[{type:"warn",text:"Core stats are NOT in the Aggressive pool — a common mistake. Only Adept's reaches Strength, Willpower, etc."},{type:"tip",text:"The only prism that can target skill-level affixes like '+X to Fireball' or '+X to Core Skills'."}],
   gemPath:"M9,4 L15,4 L18,9 L15,14 L9,14 L6,9 Z"
  },
  {id:"kullean",name:"Kullean Tuning Prism",category:"Transfiguration — Amulet Special",rarity:"special",rarityLabel:"Special",color:"#9050b8",tags:["special"],isSpecial:true,
   specialDesc:`<p>Used exclusively during <strong>Transfiguration on Amulets</strong>. Adds a bonus <strong>Legendary Aspect</strong> from the utility pool rather than narrowing affix categories.</p><p><strong>Unique behaviour:</strong> Amulets transfigured with this prism are <strong>guaranteed to remain modifiable</strong>, allowing you to reroll the added aspect as many times as you need — making amulets the safest and most repeatable Transfiguration slot.</p><p>Cannot be used for Chaotic/Focused Rerolls or Add Affix recipes. Amulets only.</p>`
  },
  {id:"entropic",name:"Entropic Tuning Prism",category:"Transfiguration — Outcome Limiter",rarity:"special",rarityLabel:"Special",color:"#606878",tags:["special"],isSpecial:true,
   specialDesc:`<p>Modifies Transfiguration by <strong>removing the absolute worst and best possible outcomes</strong>, pushing results toward the middle range — reducing catastrophic rolls at the cost of capping your ceiling.</p><p><strong>Critical warning:</strong> This prism still carries a <strong>100% chance</strong> of making the item <strong>permanently Unmodifiable</strong>. Reserve for your irreplaceable pieces (Mythics, perfect GA combinations) as an absolute final step.</p>`
  }
];

let activeFilter='all',searchQuery='';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hi(t){
  if(!searchQuery)return esc(t);
  const re=new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(t).replace(re,'<mark>$1</mark>');
}

function matchesPrism(p){
  if(activeFilter!=='all'&&!p.tags.includes(activeFilter))return false;
  if(!searchQuery)return true;
  if(p.name.toLowerCase().includes(searchQuery))return true;
  if(p.category.toLowerCase().includes(searchQuery))return true;
  if(!p.isSpecial&&p.affixes&&p.affixes.some(a=>a.toLowerCase().includes(searchQuery)))return true;
  if(p.isSpecial&&p.specialDesc&&p.specialDesc.toLowerCase().includes(searchQuery))return true;
  return false;
}

function gemSvg(color){
  return `<svg viewBox="0 0 24 24" width="18" height="18">
    <polygon points="12,2 20,7 20,17 12,22 4,17 4,7" fill="${color}22" stroke="${color}" stroke-width="1.2"/>
    <polygon points="12,6 17,9 17,15 12,18 7,15 7,9" fill="${color}15"/>
    <circle cx="12" cy="12" r="2.5" fill="${color}" opacity=".8"/>
  </svg>`;
}

function renderCard(p){
  const style=`style="--prism-color:${p.color}"`;

  if(p.isSpecial){
    return `<div class="prism-card" ${style}>
      <div class="prism-header">
        <div class="prism-gem">${gemSvg(p.color)}</div>
        <div>
          <div class="prism-name">${hi(p.name)}</div>
          <div class="prism-cat">${p.category}</div>
        </div>
        <span class="prism-rarity rarity-${p.rarity}">${p.rarityLabel}</span>
      </div>
      <div class="special-body">${p.specialDesc}</div>
    </div>`;
  }

  const affixItems=(p.affixes||[]).map(a=>{
    const isMatch=searchQuery&&a.toLowerCase().includes(searchQuery);
    const isBug=a.includes('⚠');
    return `<li class="affix-item${isMatch?' highlighted':''}${isBug?' dim':''}">
      <span class="affix-bullet"></span>
      <span>${hi(a)}</span>
    </li>`;
  }).join('');

  const notes=(p.notes||[]).map(n=>`<div class="${n.type==='warn'?'note-box':'tip-box'}">${n.text}</div>`).join('');

  return `<div class="prism-card" ${style}>
    <div class="prism-header">
      <div class="prism-gem">${gemSvg(p.color)}</div>
      <div>
        <div class="prism-name">${hi(p.name)}</div>
        <div class="prism-cat">${p.category}</div>
      </div>
      <span class="prism-rarity rarity-${p.rarity}">${p.rarityLabel}</span>
    </div>
    <div class="prism-body">
      <ul class="affix-list">${affixItems}</ul>
      ${notes}
    </div>
  </div>`;
}

function render(){
  const filtered=PRISMS.filter(matchesPrism);
  const rc=document.getElementById('resultsCount');
  rc.textContent=filtered.length===PRISMS.length?`All ${PRISMS.length} prisms`:`${filtered.length} of ${PRISMS.length} prisms`;

  const content=document.getElementById('content');
  if(!filtered.length){
    content.innerHTML=`<div class="empty"><span class="empty-icon">◇</span><div style="font-family:'Cinzel',serif;font-size:13px;color:#3a2c1a">No prisms found</div><div style="font-size:12px;margin-top:6px;color:#2a1e10">Try a different search or filter</div></div>`;
    return;
  }

  const standard=filtered.filter(p=>!p.isSpecial);
  const special=filtered.filter(p=>p.isSpecial);
  let html='';

  if(standard.length){
    html+=`<div class="section-label">Affix category prisms</div><div class="prism-grid">`;
    standard.forEach(p=>{html+=renderCard(p);});
    html+=`</div>`;
  }
  if(special.length){
    if(standard.length)html+=`<div style="margin-top:20px"></div>`;
    html+=`<div class="section-label">Special &amp; transfiguration prisms</div><div class="prism-grid">`;
    special.forEach(p=>{html+=renderCard(p);});
    html+=`</div>`;
  }
  content.innerHTML=html;
}

document.getElementById('search').addEventListener('input',function(){
  searchQuery=this.value.toLowerCase().trim();render();
});
document.getElementById('tabs').addEventListener('click',function(e){
  const tab=e.target.closest('.tab');
  if(!tab)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  activeFilter=tab.dataset.filter;render();
});

render();
</script>
