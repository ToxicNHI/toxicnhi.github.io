<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Devil</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 320, H = 480;
canvas.width = W; canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = W * s + 'px'; canvas.style.height = H * s + 'px';
}
resize(); window.addEventListener('resize', resize);

const GRAV = 0.15, JUMP = -4.5, PIPE_W = 52, GAP = 185, PIPE_SPEED = 2.2, PIPE_INTERVAL = 90;

let state, bird, pipes, score, frame, best;
best = 0;

// Flame particles
let flames = [];
// Lava bubbles
let bubbles = [];
// Skull decorations on spikes
let bgSkullX = [40, 120, 200, 280];

function spawnFlame(x, y) {
  flames.push({ x, y, vx: (Math.random()-0.5)*1.2, vy: -Math.random()*2-1, life: 1, size: Math.random()*8+4 });
}

function init() {
  state = 'idle';
  bird = { x: 80, y: H/2, vy: 0, rot: 0 };
  pipes = []; score = 0; frame = 0;
  flames = []; bubbles = [];
}

function jump() {
  if (state === 'dead') { init(); return; }
  if (state === 'idle') state = 'playing';
  bird.vy = JUMP;
}

document.addEventListener('keydown', e => { if (e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}});
canvas.addEventListener('pointerdown', jump);

let gx = 0;

function spawnPipe() {
  const minTop = 60, maxTop = H - 130 - GAP;
  const topH = minTop + Math.random()*(maxTop-minTop);
  const gap = 155 + Math.random() * 80;
  pipes.push({ x: W, topH, gap });
}

// Draw hell background
function drawBackground() {
  // Deep hell gradient sky
  const sg = ctx.createLinearGradient(0, 0, 0, H-100);
  sg.addColorStop(0, '#0a0000');
  sg.addColorStop(0.3, '#3a0000');
  sg.addColorStop(0.7, '#7a1500');
  sg.addColorStop(1, '#c43000');
  ctx.fillStyle = sg;
  ctx.fillRect(0, 0, W, H-100);

  // Distant hell mountains / crags
  ctx.fillStyle = '#1a0000';
  drawCrags(0, H-200, 14, 60, 100);
  ctx.fillStyle = '#2a0505';
  drawCrags(30, H-170, 10, 40, 80);

  // Eerie glowing cracks in the sky
  ctx.strokeStyle = 'rgba(255,80,0,0.4)';
  ctx.lineWidth = 1.5;
  [[40,60,70,120],[150,30,130,100],[220,80,260,150],[80,150,50,200]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });

  // Hanging stalactites from top
  ctx.fillStyle = '#1a0000';
  for(let i=0;i<8;i++){
    const sx = i*44+((frame*0.3)%44)-22;
    const sh = 20+Math.sin(i*1.7)*15;
    ctx.beginPath();
    ctx.moveTo(sx,0); ctx.lineTo(sx+10,sh); ctx.lineTo(sx+20,0);
    ctx.fill();
  }

  // Ambient fire glow at bottom of sky
  const fg = ctx.createLinearGradient(0, H-160, 0, H-100);
  fg.addColorStop(0,'rgba(200,50,0,0)');
  fg.addColorStop(1,'rgba(255,100,0,0.4)');
  ctx.fillStyle=fg;
  ctx.fillRect(0,H-160,W,60);
}

function drawCrags(offsetX, baseY, count, minH, maxH) {
  ctx.beginPath();
  ctx.moveTo(0, H);
  for(let i=0;i<=count;i++){
    const x = offsetX + (i/(count))*W;
    const h = minH + Math.sin(i*2.3+offsetX)*((maxH-minH)/2) + (maxH-minH)/2;
    ctx.lineTo(x, baseY + (maxH - h));
  }
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
}

// Lava ground
function drawGround() {
  // Lava base
  const lg = ctx.createLinearGradient(0, H-100, 0, H);
  lg.addColorStop(0,'#cc3300'); lg.addColorStop(0.3,'#ff6600'); lg.addColorStop(0.6,'#ff3300'); lg.addColorStop(1,'#991100');
  ctx.fillStyle=lg;
  ctx.fillRect(0, H-100, W, 100);

  // Lava flow shimmer
  const t = frame*0.04;
  for(let i=0;i<6;i++){
    const lx = ((i*60 + frame*1.5)%340)-20;
    const ly = H-90+Math.sin(t+i)*6;
    const lg2 = ctx.createRadialGradient(lx,ly,2,lx,ly,22);
    lg2.addColorStop(0,'rgba(255,220,0,0.6)'); lg2.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=lg2; ctx.beginPath(); ctx.ellipse(lx,ly,22,10,0,0,Math.PI*2); ctx.fill();
  }

  // Lava bubbles
  if(Math.random()<0.08) bubbles.push({x:Math.random()*W, y:H-60, r:3+Math.random()*5, life:1});
  bubbles = bubbles.filter(b=>{
    b.y -= 0.5; b.life -= 0.02; b.r *= 0.99;
    if(b.life<=0) return false;
    ctx.strokeStyle=`rgba(255,200,0,${b.life*0.8})`; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
    return true;
  });

  // Ground spikes
  ctx.fillStyle='#550000';
  for(let i=0;i<12;i++){
    const sx=((i*28+gx*0.8)%(W+28))-14;
    ctx.beginPath();
    ctx.moveTo(sx,H-100); ctx.lineTo(sx+7,H-130); ctx.lineTo(sx+14,H-100);
    ctx.fill();
    // Spike glow tip
    const rg=ctx.createRadialGradient(sx+7,H-130,0,sx+7,H-130,8);
    rg.addColorStop(0,'rgba(255,100,0,0.7)'); rg.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(sx+7,H-130,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#550000';
  }

  // Ceiling spikes
  ctx.fillStyle='#1a0000';
  for(let i=0;i<12;i++){
    const sx=((i*28+gx*0.8+14)%(W+28))-14;
    ctx.beginPath();
    ctx.moveTo(sx,0); ctx.lineTo(sx+7,30); ctx.lineTo(sx+14,0);
    ctx.fill();
  }
}

// Spike pillar (replacing pipes)
function drawSpikePillar(px, topH, gap) {
  const botY = topH + gap;
  const botH = H - 100 - botY;
  const numSpikesTop = Math.ceil(PIPE_W / 14);
  const numSpikesBot = Math.ceil(PIPE_W / 14);

  // ---- TOP PILLAR ----
  const tg = ctx.createLinearGradient(px, 0, px+PIPE_W, 0);
  tg.addColorStop(0,'#1a0000'); tg.addColorStop(0.4,'#3a0505'); tg.addColorStop(1,'#1a0000');
  ctx.fillStyle = tg;
  ctx.fillRect(px, 0, PIPE_W, topH);

  // Rock texture lines
  ctx.strokeStyle='rgba(100,0,0,0.4)'; ctx.lineWidth=1;
  for(let y=10;y<topH;y+=18){ctx.beginPath();ctx.moveTo(px+4,y);ctx.lineTo(px+PIPE_W-4,y+4);ctx.stroke();}

  // Spikes pointing DOWN from top pillar
  ctx.fillStyle='#550000';
  for(let i=0;i<numSpikesTop;i++){
    const sx=px+i*14;
    ctx.beginPath();
    ctx.moveTo(sx,topH); ctx.lineTo(sx+7,topH+22); ctx.lineTo(sx+14,topH);
    ctx.fill();
    const rg=ctx.createRadialGradient(sx+7,topH+20,0,sx+7,topH+20,8);
    rg.addColorStop(0,'rgba(255,80,0,0.8)'); rg.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(sx+7,topH+20,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#550000';
  }

  // Skull on top pillar face
  drawSkull(px+PIPE_W/2, topH-30);

  // ---- BOTTOM PILLAR ----
  ctx.fillStyle=tg;
  ctx.fillRect(px, botY, PIPE_W, botH);

  for(let y=botY+10;y<botY+botH;y+=18){ctx.strokeStyle='rgba(100,0,0,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+4,y);ctx.lineTo(px+PIPE_W-4,y+4);ctx.stroke();}

  // Spikes pointing UP from bottom pillar
  ctx.fillStyle='#550000';
  for(let i=0;i<numSpikesBot;i++){
    const sx=px+i*14;
    ctx.beginPath();
    ctx.moveTo(sx,botY); ctx.lineTo(sx+7,botY-22); ctx.lineTo(sx+14,botY);
    ctx.fill();
    const rg=ctx.createRadialGradient(sx+7,botY-20,0,sx+7,botY-20,8);
    rg.addColorStop(0,'rgba(255,80,0,0.8)'); rg.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(sx+7,botY-20,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#550000';
  }

  // Skull on bottom pillar
  drawSkull(px+PIPE_W/2, botY+30);

  // Glow between gap
  const gg=ctx.createLinearGradient(0,topH,0,botY);
  gg.addColorStop(0,'rgba(255,50,0,0.15)'); gg.addColorStop(0.5,'rgba(255,100,0,0)'); gg.addColorStop(1,'rgba(255,50,0,0.15)');
  ctx.fillStyle=gg; ctx.fillRect(px,topH,PIPE_W,GAP);
}

function drawSkull(cx, cy) {
  ctx.fillStyle='#cc9966';
  ctx.beginPath(); ctx.ellipse(cx,cy,9,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a0000';
  // eyes
  ctx.beginPath(); ctx.ellipse(cx-3,cy-1,2.5,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+3,cy-1,2.5,2.5,0,0,Math.PI*2); ctx.fill();
  // teeth
  ctx.fillStyle='#eee';
  [-3,0,3].forEach(tx=>{ ctx.fillRect(cx+tx-1,cy+5,2,3); });
}

function drawBird() {
  const b = bird;
  ctx.save();
  ctx.translate(b.x, b.y);
  const targetRot = Math.max(-25, Math.min(90, b.vy*4));
  b.rot += (targetRot - b.rot)*0.2;
  ctx.rotate(b.rot * Math.PI/180);

  // Fire aura
  if(state==='playing'&&Math.random()<0.4) spawnFlame(b.x+(Math.random()-0.5)*20, b.y+(Math.random()-0.5)*14);

  // Body
  ctx.fillStyle='#cc1a1a';
  ctx.beginPath(); ctx.ellipse(0,0,17,13,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#8b0000'; ctx.lineWidth=1.5; ctx.stroke();

  // Leathery wing
  ctx.fillStyle='#8b0000';
  ctx.beginPath(); ctx.ellipse(-4,3,10,5,-0.3,0,Math.PI*2); ctx.fill();

  // Belly
  ctx.fillStyle='#e03030';
  ctx.beginPath(); ctx.ellipse(3,4,8,6,0.2,0,Math.PI*2); ctx.fill();

  // Horns
  ctx.fillStyle='#8b0000'; ctx.strokeStyle='#5a0000'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(-6,-11); ctx.lineTo(-10,-22); ctx.lineTo(-3,-13); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,-12); ctx.lineTo(6,-23); ctx.lineTo(7,-12); ctx.closePath(); ctx.fill(); ctx.stroke();

  // Eye
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(8,-4,6,6,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#8b0000'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='#ff0';
  ctx.beginPath(); ctx.ellipse(9,-4,3,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(9,-4,1,3.5,0,0,Math.PI*2); ctx.fill();

  // Brow
  ctx.strokeStyle='#5a0000'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(4,-10); ctx.lineTo(13,-8); ctx.stroke();

  // Snout
  ctx.fillStyle='#a01010';
  ctx.beginPath(); ctx.moveTo(13,-2); ctx.lineTo(22,1); ctx.lineTo(13,5); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#5a0000'; ctx.lineWidth=1; ctx.stroke();

  // Fangs
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.moveTo(13,2); ctx.lineTo(15,6); ctx.lineTo(17,2); ctx.closePath(); ctx.fill();

  ctx.restore();
}

// Update & draw flame particles
function updateFlames() {
  flames = flames.filter(f => {
    f.x += f.vx; f.y += f.vy; f.life -= 0.04; f.size *= 0.95;
    if(f.life<=0) return false;
    const a = f.life;
    const fg = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size);
    fg.addColorStop(0,`rgba(255,220,50,${a})`);
    fg.addColorStop(0.5,`rgba(255,80,0,${a*0.7})`);
    fg.addColorStop(1,`rgba(200,0,0,0)`);
    ctx.fillStyle=fg;
    ctx.beginPath(); ctx.arc(f.x,f.y,f.size,0,Math.PI*2); ctx.fill();
    return true;
  });
}

function drawScore() {
  ctx.fillStyle='#ff6600';
  ctx.strokeStyle='#330000'; ctx.lineWidth=3;
  ctx.font='bold 36px Arial'; ctx.textAlign='center';
  ctx.strokeText(score,W/2,60); ctx.fillText(score,W/2,60);
}

function drawOverlay() {
  if(state==='idle'){
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,W,H);
    // Title glow
    ctx.shadowColor='#ff4400'; ctx.shadowBlur=20;
    ctx.fillStyle='#ff4400';
    ctx.font='bold 36px Arial'; ctx.textAlign='center';
    ctx.fillText('FLAPPY DEVIL',W/2,155);
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffaa00';
    ctx.font='18px Arial';
    ctx.fillText('Tap / Space to fly',W/2,200);
    ctx.fillStyle='#cc4400';
    ctx.font='16px Arial';
    ctx.fillText('Best: '+best,W/2,230);
  }
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#1a0000';
    ctx.strokeStyle='#cc2200'; ctx.lineWidth=3;
    roundRect(ctx,W/2-105,H/2-95,210,180,10);
    ctx.fill(); ctx.stroke();
    ctx.shadowColor='#ff2200'; ctx.shadowBlur=15;
    ctx.fillStyle='#ff2200';
    ctx.font='bold 28px Arial'; ctx.textAlign='center';
    ctx.fillText('YOU DIED',W/2,H/2-58);
    ctx.shadowBlur=0;
    ctx.fillStyle='#ff8844';
    ctx.font='18px Arial';
    ctx.fillText('Score: '+score,W/2,H/2-22);
    ctx.fillText('Best:  '+best,W/2,H/2+8);
    // Play again btn
    ctx.fillStyle='#8b0000';
    roundRect(ctx,W/2-65,H/2+30,130,42,8);
    ctx.fill();
    ctx.strokeStyle='#cc2200'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#ffffff';
    ctx.font='bold 18px Arial';
    ctx.fillText('Try Again 😈',W/2,H/2+57);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function checkCollision(){
  const bx=bird.x,by=bird.y,br=12;
  if(by+br>=H-100||by-br<=0) return true;
  for(const p of pipes){
    const px=p.x,topH=p.topH,botY=topH+GAP;
    const nearX=Math.max(px,Math.min(bx,px+PIPE_W));
    const nearY1=Math.max(0,Math.min(by,topH+22));
    const nearY2=Math.max(botY-22,Math.min(by,H-100));
    if(Math.hypot(bx-nearX,by-nearY1)<br) return true;
    if(Math.hypot(bx-nearX,by-nearY2)<br) return true;
  }
  return false;
}

function update(){
  if(state!=='playing') return;
  frame++; gx+=PIPE_SPEED;
  bird.vy+=GRAV; bird.y+=bird.vy;
  if(frame%PIPE_INTERVAL===0) spawnPipe();
  for(const p of pipes){
    p.x-=PIPE_SPEED;
    if(!p.scored&&p.x+PIPE_W<bird.x){p.scored=true;score++;}
  }
  pipes=pipes.filter(p=>p.x+PIPE_W>-10);
  if(checkCollision()){
    state='dead';
    if(score>best) best=score;
    // Burst of flames on death
    for(let i=0;i<20;i++) spawnFlame(bird.x+(Math.random()-0.5)*30,bird.y+(Math.random()-0.5)*20);
  }
}

function loop(){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  pipes.forEach(p=>drawSpikePillar(p.x,p.topH,p.gap));
  drawGround();
  updateFlames();
  drawBird();
  if(state==='playing') drawScore();
  drawOverlay();
  update();
  requestAnimationFrame(loop);
}

init(); loop();
</script>
</body>
</html>
